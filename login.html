<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Casos SI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <img src="{{ url_for('static', filename='img/logo_santaisabel.png') }}" alt="Logo" class="login-logo">
            <h2>Controle de Casos - SI</h2>
            <p>Acesse sua conta para continuar</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Seu usuário" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" class="login-button">Entrar</button>
                <p id="errorMessage" class="error-message"></p>
            </form>
        </div>
    </div>

    <div class="watermark">Desenvolvido por Alex Silva Santos.</div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
